# BoT-SORT tracker with ReID enabled for product re-identification.
# Based on Ultralytics default botsort.yaml with with_reid: True.
# Usage: inference=botsort on CLI, or set inference.tracker directly.

tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 180
match_thresh: 0.8
fuse_score: true

# BoT-SORT specifics
gmc_method: sparseOptFlow

# ReID — enabled for 116-class checkout use case
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: true
model: auto
